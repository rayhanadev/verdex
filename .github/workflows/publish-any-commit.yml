name: Publish Any Commit

# Publishes an installable preview of every push/PR via pkg.pr.new, so reviewers can
# `npm i https://pkg.pr.new/@rayhanadev/verdex@<sha>` and try the exact build.
# Requires the pkg.pr.new GitHub App to be installed on the repo.

on: [push, pull_request]

permissions: {}

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (smoke-test)
        run: bun run build

      - name: Publish preview to pkg.pr.new
        run: bunx pkg-pr-new publish "./"
