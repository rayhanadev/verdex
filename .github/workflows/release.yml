name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # push the Version Packages PR + the release tag
      pull-requests: write # open/update the Version Packages PR
      id-token: write # npm trusted publishing (OIDC) — no NPM_TOKEN needed
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      # npm (not bun) does the publish: bun publish does not support npm OIDC.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest # trusted publishing needs npm >= 11.5.1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # When changesets exist, open/update the "Version Packages" PR (bump + CHANGELOG
      # via @changesets/changelog-github). Merging that PR is what advances the version.
      - name: Create Version Packages PR
        uses: changesets/action@v1
        with:
          version: bun run version
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Publish to npm via OIDC trusted publishing when the current version isn't on
      # npm yet (i.e. right after the Version Packages PR merges). Idempotent: a no-op
      # on every other push. Provenance is generated automatically by trusted publishing.
      - name: Publish to npm (trusted publishing)
        run: |
          name="$(node -p "require('./package.json').name")"
          version="$(node -p "require('./package.json').version")"
          if npm view "${name}@${version}" version >/dev/null 2>&1; then
            echo "${name}@${version} is already published — nothing to do."
            exit 0
          fi
          echo "Publishing ${name}@${version}..."
          bun run build
          npm publish --access public
          git tag "v${version}"
          git push origin "v${version}"
        env:
          NPM_CONFIG_PROVENANCE: "true"
