coverage:
  status:
    project:
      default:
        target: 85%
        threshold: 2%
    patch:
      default:
        target: 80%
        threshold: 5%

comment:
  layout: "reach, diff, flags, files"
  require_changes: true

ignore:
  - "src/index.ts" # barrel re-exports
  - "src/schema.ts" # types-only Standard Schema spec
  - "tests"
  - "examples"
